services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes: []

  worker:
    volumes: []

  beat:
    volumes: []

  web:
    command: sh -c "npm run build && npm run start -- --hostname 0.0.0.0"
    volumes: []
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
